[pytest]
asyncio_mode = auto
# UPG-PYTEST-SCOPING: scope unqualified `pytest` invocations to the actual test
# suite. Without this, running bare `pytest` from the repo root also collects
# anything under tmp/ (git-ignored index fixtures checked out for acceptance
# benchmarking, e.g. tmp/vectr-accept-django/tests/) as if it were part of the
# vectr test suite, producing hundreds of unrelated collection errors. This
# matches the scope CI already uses (tests agent integrations app); it does
# not change behavior for the scoped invocation.
testpaths =
    tests
    agent
    integrations
    app
markers =
    integration: requires real embedding model download (~300 MB); run with -m integration
    live_api: makes real Anthropic API calls (~$0.01 each); run with -m live_api
    ragas: offline retrieval quality eval (requires ragas + LLM API key); run with -m ragas
addopts = -m "not integration and not live_api and not ragas"
