      - nonlocal
      - assert
      - raise
      - del
      - in
      - is
      - not
      - and
      - or
      - async
      - await
      - None
      - True
      - False
      # Not a real keyword, but a pre-existing noise guard: `print(...)` call
      # sites were already suppressed as call-edge targets before this list
      # existed — kept here so the exclusion stays config-driven.
      - print
    javascript:
