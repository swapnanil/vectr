  # UPG-REACT-TSX-FUNCTION-DECL-DROP: recovery for a grammar desync that
  # swallows an unrelated region of siblings into one opaque, mis-typed node
  # (e.g. a single unparseable construct hundreds of lines earlier can wreck
  # the parser's recovery for the rest of the file). Language-agnostic — any
  # tree-sitter grammar's error-recovery path can produce this shape, not
  # just Flow/tsx. When the walker hits a node that is not itself a
  # recognized symbol/call construct but has_error is set and its own span
  # is large, it is worth an isolated reparse of just that byte range: the
  # parser often resyncs cleanly once it starts fresh without the earlier
  # desync's carried-over state.
  error_recovery:
    # Minimum line-span (end_line - start_line) an opaque errored node must
    # cover before an isolated reparse is attempted. A short span IS the
    # error (no swallowed siblings to recover) — reparsing it wastes a parse
    # pass for nothing.
    min_span_lines: 8
    # Reparse attempts budget per file. Bounds worst-case parse cost when a
    # file has many/deeply-nested desynced regions.
    max_reparse_attempts_per_file: 200
    # Per-attempt cap on how many original siblings a single recovery reparse
    # may absorb while growing past an arbitrary mid-declaration cut (see
    # error_recovery above). Without its own cap, one badly-cut region can
    # burn the entire per-file budget growing sibling-by-sibling and starve
    # every other desynced region in the same file.
    max_extend_steps_per_attempt: 20

cli:
  # UPG-CLI-START-READY-RACE: `vectr start`/`restart` spawn the daemon as a
  # detached background process and used to print a success block
  # immediately after Popen() returned — before the daemon had bound its
  # port or finished loading the embedder in its FastAPI lifespan. A
  # `vectr status` run right after start's "success" message could still see
  # a connection refused, reading as "start lied." `_do_start` now polls
  # /v1/status until the daemon actually answers (or this timeout elapses)
  # before printing anything, so the message reflects reality.
  start_ready_poll_timeout_s: 20.0
  # How often to retry the readiness probe while waiting (above).
  start_ready_poll_interval_s: 0.3
  # Per-attempt HTTP timeout for a single readiness probe during the poll
  # loop above — short, since a probe that hangs this long just means "not
  # ready yet," and we want to retry rather than block on one slow attempt.
  start_ready_probe_timeout_s: 1.0
  # UPG-CLI-DAEMON-VERSION-SKEW: HTTP timeout for the standalone /v1/status
  # probe a daemon-talking subcommand issues to compare its local version
  # stamp against the running daemon's. Short and best-effort — a slow/failed
  # probe just means the check is skipped this invocation, never a blocked
  # command.
  version_skew_probe_timeout_s: 1.0

workspace:
  # Directory names written into a FRESH .vectrignore on first `vectr start` /
  # `vectr init` when the workspace has none yet (UPG-13.2). An existing
  # .vectrignore is never overwritten. These mirror the built-in indexing
  # excludes (agent.indexer.EXCLUDED_DIRS) plus common ecosystem cache/build
  # dirs, so a new user sees sensible excludes without hand-authoring them.
  default_vectrignore_dirs:
    - node_modules
    - .venv
    - venv
    - env
    - __pycache__
    - .git
    - dist
    - build
    - target
    - .mypy_cache
    - .pytest_cache
    - .ruff_cache
    - htmlcov
    - coverage
    - .tox
    - .cache
    - tmp
    - vendor
    - .next
    - .nuxt
    - out

watcher:
  # How often (seconds) CodeWatcher shallow-scans each workspace root's
  # TOP-LEVEL entries only (UPG-13.1/13.3). The watcher never schedules a
  # native OS watch on the workspace root itself — on macOS, FSEvents
  # delivers every event under a watched path's *entire* subtree to the
  # Python emitter regardless of the `recursive` flag passed to watchdog, so
  # watching the root non-recursively gives zero protection against a large
  # excluded sibling directory (confirmed empirically: churn inside an
  # unwatched excluded dir produces zero native events; churn inside the
  # same dir under a "non-recursive" root watch delivers 100% of events).
  # Only per-included-top-level-directory watches actually stop the flood.
  # This interval is how quickly a brand-new top-level directory, or an edit
  # to a top-level loose file, is picked up instead — the shallow scan stats
  # only the root's direct children, never the whole tree, so it stays cheap
  # regardless of repo size.
  top_level_rescan_interval_s: 5.0

  # UPG-WATCHER-PRESSURE-GOVERNOR: burst coalescing. A sustained multi-file
  # edit stream (AI coding agents editing many files in quick succession) hits
  # the per-file debounce independently for every path, so the embed pipeline
  # never goes idle — no global ceiling on concurrent re-embed work. When more
  # than this many distinct paths are pending debounce SIMULTANEOUSLY, every
  # per-file timer is cancelled and every pending path collapses into one
  # deferred batch re-index instead — an edit storm then costs one batch pass
  # over N files, not N independent re-embeds.
  burst_files_threshold: 8
  # Seconds of repo-wide silence (no new watched-file event) required, once
  # burst coalescing has kicked in, before the collapsed batch actually runs.
  # Keeps the batch from firing mid-storm and having to run again seconds
  # later for the next wave of edits from the same agent turn.
  burst_quiet_seconds: 15.0
  # Optional self-limit (MB) on this process's own resident memory before a
  # watcher-triggered batch re-index is allowed to run; 0 disables the check
  # (default — the watcher never inspects memory unless a laptop operator
  # opts in). When set and exceeded, the batch is deferred to the next quiet
  # window and ONE warning line is logged instead of running — the collected
  # paths are never dropped, just retried later. Reads this process's peak
  # resident set size (stdlib `resource.getrusage`, no extra dependency);
  # peak RSS is monotonically non-decreasing for the life of the process, so
  # once tripped this acts as a standing "this process has run hot before,
  # stop feeding it more embed work" brake rather than an instantaneous
  # reading — deliberately conservative for a resource-safety guard.
  max_rss_mb: 0

hooks:
  # UPG-HOOK-INJECT-OBSERVABILITY: when true, every hook-driven recall that
  # actually injects notes (SessionStart/UserPromptSubmit/PreToolUse) appends
  # one line to ~/.vectr/logs/<workspace-hash>.hooks.log — timestamp, hook
  # kind, and an approximate token count of what was injected. Off by
  # default: the per-hook-kind counters in `vectr status` already answer the
  # common "is this actually firing" question without writing to disk; turn
  # this on only when auditing exact injection timing/volume.
  log_injections: false

  # Divisor used to turn the injected notes' character count into an
  # approximate token count for the optional injection log above. 4 is the
  # commonly-cited chars-per-token ratio for English/code text; this is a
  # rough sizing signal for the log, not a billing-accurate count.
  log_chars_per_token: 4

  # Per-turn UserPromptSubmit recall relevance floor (UPG-9.5) — a candidate
  # note's cosine similarity to the current prompt must clear this before
  # the hook injects it at all. Raised from 0.35 to 0.72 (adversarial-review
  # measurement, 2026-07-15): at 0.35 the hook injected 3 irrelevant notes
  # on 8/8 deliberately off-topic prompts in the same adversarial set (about
  # 140 wasted tokens every turn); the M trigger primitive's own per-kind
  # thetas (memory_triggers.semantic.theta_by_kind, 0.72-0.80) had 0/8 false
  # fires on the identical prompts. 0.72 matches the lowest of those thetas.
  min_similarity: 0.72

embedding:
  # Default local (sentence-transformers) embedding model for the L3 content
  # index (UPG-EMBEDDER-SWAP-GRANITE). Dimension-compatible drop-in for the
  # prior default (Snowflake/snowflake-arctic-embed-m-v1.5 — both 768-dim),
  # but a DIFFERENT vector space: a workspace's collection must never mix
  # vectors from the two (see CodeIndexer's embed-model stamp, which forces
  # a full rebuild on a stamp mismatch rather than letting old and new
  # vectors coexist). Query-prompt handling stays model-driven, never
  # hardcoded to either model's specific prefix convention: LocalEmbedProvider
  # detects a registered "query" prompt on the loaded model itself
  # (`model.prompts`) and only applies it when one exists, so a model with no
  # such registration (like this default) embeds queries and documents
  # identically, unchanged.
  default_model: ibm-granite/granite-embedding-english-r2
  # Hard cap on the encoder's token sequence length for local (sentence-
  # transformers) embedding, applied on top of whatever the model's own
  # config declares. Long-context embedders (this default declares 8192)
  # otherwise encode every long chunk at full length — quadratic-attention
  # cost on CPU, observed to stall a full-corpus index for hours — while
  # short-context models (512) are unaffected. 512 matches the prior
  # default's behavior; raise deliberately, with indexing throughput in mind.
  max_seq_length: 512

  # Hard cap on the number of CPU threads the local (torch-backed) embedding
  # model may use — applied via torch.set_num_threads/set_num_interop_threads
  # at LocalEmbedProvider construction, so it also governs the cross-encoder
  # reranker (same process-wide torch thread pool) (UPG-EMBED-THREAD-CONTENTION).
  # Without a cap, a debounced watcher batch embed saturates every core and
  # the HTTP event loop gets no scheduler slice — a live session's first MCP
  # call (vectr_status/vectr_recall) can time out 30-60s even though no lock
  # is held. 0 = auto: derive the cap from thread_cap_auto_fraction below
  # instead of using this fixed value; a positive integer here is used
  # verbatim as an operator override.
  thread_cap: 0

  # Fraction of the machine's CPU core count (os.cpu_count()) used to compute
  # the auto thread cap when thread_cap is 0 above. 0.5 (half the cores,
  # minimum 1) leaves the other half free for the HTTP event loop, the
  # watcher's own file-scan work, and any concurrent MCP tool dispatch.
  thread_cap_auto_fraction: 0.5

fetch:
  # UPG-CTX-EVICT: deterministic re-fetch-by-chunk-id contract. Every chunk
  # already carries a stable id (`file_path:start_line-end_line`, the literal
  # ChromaDB id) — vectr_fetch/POST /v1/fetch/`vectr fetch` restore any of
  # them verbatim in one call, no embedding or rerank involved. This caps how
  # many ids a single call may request, so a caller can't turn the re-fetch
  # surface into an unbounded bulk-export of the whole index.
  max_ids_per_call: 20

memory_triggers:
  # TRIGGER-ENGINE wave 1 (bm2-design-skeleton.md §2/§3) — per-memory P/E/T
  # triggers: one deterministic total order, reused for fire precedence,
  # injection ordering, AND budget eviction (agent/trigger_engine.py).
  total_order:
    # Kind precedence, highest first. Governs which kind wins a tie in fire
    # order, injection order, and (from the bottom) eviction order.
    kind_priority:
      - directive
      - gotcha
      - task
      - finding
      - reference
    # Note priority precedence, highest first.
    priority_rank:
      - high
      - medium
      - low

  injection:
    # Per-injected-memory token cap (full-text tier: directive/gotcha). A
    # memory over this cap is NEVER partially truncated — it either injects
    # whole or drops to its index-tier one-liner (never a half-cut body).
    per_injection_token_cap: 1500
    # Cumulative token cap for everything injected in one delivery moment
    # (one hook firing / one fire-evaluation call). Notes are packed in total-
    # order; once the budget is exhausted, remaining notes are evicted from
    # the bottom of that same order.
    per_session_token_cap: 8000
    # Chars-per-token estimate used to size injected text against the two
    # caps above (same rough ratio as hooks.log_chars_per_token; kept as a
    # separate key since the two domains may need to diverge later).
    chars_per_token: 4

  semantic:
    # TRIGGER-ENGINE wave 2b (bm2-design-skeleton.md §8) — the M (semantic)
    # primitive. A note may declare an explicit `{"semantic": true}` trigger
    # axis, composable with path/event/symbol like every other axis (the
    # same <=1-per-axis conjunction rule). At prompt-submit the caller
    # computes ONE activity embedding for the prompt — never one per note,
    # and a note's own vector (already stored at write time) is reused
    # as-is, never re-embedded — and the axis matches when
    # cosine(activity, note_vector) >= theta for THAT note's kind. Fixed
    # per-kind constants only: no runtime adaptation, no query parsing (the
    # no-query-heuristics rule — this is a numeric vector-similarity gate,
    # not a keyword/regex classifier). Tune by editing these numbers, never
    # by adding code. M is an explicit-trigger-only primitive this wave: no
    # kind's default bundle includes it. One entry per memory kind
    # (memory_triggers.total_order.kind_priority) is required — a missing
    # kind fails at import (agent/config.py), never silently defaults.
    theta_by_kind:
      directive: 0.72
      gotcha: 0.72
      task: 0.75
      finding: 0.78
      reference: 0.80

proactive:
  # UPG-PRO — "Proactive context" (experimental). Deterministically surface the
  # relevant working-memory note / structural match at a sanctioned delivery
  # moment, instead of waiting for the agent to ask. These are DEFAULTS
  # (product behaviour); deployment/runtime toggles live in env vars
  # (VECTR_PROACTIVE, VECTR_PROACTIVE_*), which override every value here.
  #
  # Master opt-in. Off by default. Also requires a loopback bind: team /
  # non-loopback (shared-instance) mode forces proactive OFF by construction
  # (it reads the conversation, the most sensitive data on the machine — see
  # _proactive_enabled in main.py). Never on without the user turning it on.
  enabled: false

  # Semantic floor for note injection (reuses the recall UPG-5.1 cutoff shape).
  # A candidate note whose cosine similarity to the assembled window is below
  # this is dropped, so an off-topic conversation injects nothing. Structural
  # (exact file-path) matches bypass the floor — an exact match is not a guess.
  # A numeric threshold, never keyword logic (no-query-heuristics hard rule).
  min_similarity: 0.35

  # Per-delivery injection budget. At most this many items, and at most this
  # many characters, are ever injected in one delivery moment. Higher-confidence
  # candidates fill the budget first; ties break deterministically. Keeps every
  # injection worth more than the tokens + attention (and prompt-cache churn) it
  # costs.
  max_items_per_event: 3
  max_chars_per_event: 800

  # Dedup / cooldown ledger size: the last N injected anchor ids per session are
  # suppressed, so the same note is not re-injected turn after turn.
  cooldown_items: 30

  # Matchers — each runs unconditionally on every window (no content branch
  # chooses which to run); enabling/disabling one is a STATIC toggle here, never
  # a runtime read of the conversation. Turning code_search on requires a built
  # code index; it degrades to nothing when none exists.
  matchers:
    structural_note: true    # M1: exact file-path -> anchored note (score 1.0)
    semantic_note: true      # M3: cosine note recall above min_similarity
    code_search: false       # M4: hybrid code search (opt-in; needs an index)

  # Phase 3 — localhost Anthropic-shaped API proxy. The literal "vectr in the
  # middle" of the wire: point the agent harness at it with
  # ANTHROPIC_BASE_URL, and it forwards to the real API while appending
  # deterministic context AFTER the last prompt-cache breakpoint.
  proxy:
    enabled: false                 # opt-in listener; off by default
    host: 127.0.0.1                # localhost only; a non-loopback host is refused
    port: 8785                     # proxy listener port (distinct from any daemon port)
    upstream_base_url: https://api.anthropic.com   # the real API the proxy forwards to
    connect_timeout_s: 10.0        # upstream connect timeout
    read_timeout_s: 600.0          # upstream read timeout (long-running streams)
    inject: true                   # append proactive context to proxied requests
    # Internal soft budget for the whole injection lookup (assemble window +
    # match + gate). If it is not ready within this many milliseconds, the
    # request is forwarded UNMODIFIED — a slow intelligence layer never delays
    # or blocks a real model call (fail-open). Must comfortably exceed one
    # daemon round trip, including latency spikes during watcher re-index
    # bursts, or the outer backstop below trips before the daemon provider
    # ever gets to return its own graceful "nothing to inject" result.
    inject_budget_ms: 750
    # The provider's own httpx timeout for the daemon round trip is DERIVED
    # from inject_budget_ms (never hardcoded), as this fraction of the budget,
    # capped by inject_provider_timeout_max_s. It is enforced to sit strictly
    # BELOW inject_budget_ms so the provider's own fail-open path — a clean
    # empty result — has a chance to fire before the outer asyncio.wait_for
    # backstop cancels the coroutine outright. The outer wait_for exists only
    # to bound failure modes the provider's own timeout cannot see (e.g. a
    # hang before the httpx clock starts); it is a backstop, not the primary
    # timeout mechanism.
    inject_provider_timeout_fraction: 0.8
    inject_provider_timeout_max_s: 2.0

  # Org-wide caching of vectr-layer artifacts (semantic search results, recall
  # results, embedding computations) — SAFE, invalidation-aware, attributed.
  # On a team/central instance this cache is shared by every connected client,
  # so the org computes each artifact once. Keyed by exact artifact identity +
  # the current index-state epoch, so a re-index invalidates automatically.
  # Off by default; the default search/recall path is byte-identical when off.
  cache:
    enabled: false
    max_entries: 2048              # LRU bound across all cached artifact kinds
    ttl_seconds: 0                 # 0 = no wall-clock TTL; invalidation is by index epoch only
    # Cache-key similarity threshold. 1.0 (default) = EXACT-identity keying:
    # a cached artifact is reused only for a byte-identical normalized request
    # against the same index epoch — provably the same result. Lowering below
    # 1.0 enables APPROXIMATE reuse (a cached result for an embedding-similar
    # but not identical query); this trades exactness for hit-rate and its
    # staleness semantics are documented — leave at 1.0 unless you accept that.
    similarity_threshold: 1.0
    # Exact-match LLM-response cache (proxy only). Serves a cached upstream
    # response ONLY for a byte-identical full request within the TTL. Off by
    # default and deliberately narrow: semantic-similarity response caching is
    # NOT offered (a wrong hit silently corrupts a stateful conversation) — see
    # the design doc's cache-safety analysis.
    response_cache:
      enabled: false
      ttl_seconds: 60
      max_entries: 256
