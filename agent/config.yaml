# vectr internal configuration — versioned in the repo.
# All tunables that affect ranking behaviour live here so changes are auditable
# via git history rather than buried in code.
#
# Do NOT set these via environment variables or per-user config files.
# Runtime code reads this file via importlib.resources so it works for both
# the repo-local interpreter and the pip-installed global binary.

ranking:
  symbol_boost:
    # Additive score boost when BOTH the class prefix AND the leaf method name
    # appear in the query tokens (e.g. query "Field deconstruct" matches
    # the chunk for Field.deconstruct).
    qualified_boost: 0.20

    # Additive score boost when only the leaf method name appears in the query
    # tokens (e.g. query "deconstruct migration" matches any *.deconstruct chunk).
    leaf_boost: 0.10

    # Bare single-word leaves shorter than this many characters receive NO boost,
    # even if they appear in the query.  Two- and three-letter identifiers are
    # too ambiguous (e.g. leaf "do", "in", "on" would falsely boost on prose).
    # The prog_stopwords list catches the borderline 3-letter programming words.
    min_leaf_len: 4

    # Stopword data files (relative to the agent package, loaded via importlib).
    # Both files are merged into a single frozenset at startup.
    stopwords_files:
      - data/english_stopwords.txt   # NLTK English corpus (vendored offline)
      - data/prog_stopwords.txt      # short programming abbreviations supplement

  forced_inclusion:
    # Safety cap on the total number of extra chunks added to the candidate pool
    # via forced-inclusion.  Prevents flooding on pathological corpora where a
    # common method name appears in thousands of files.  Real codebases typically
    # have ≤100 same-named methods (Django has 81 "deconstruct" chunks).
    max_candidates: 200

    # Minimum character length for a bare (non-compound) identifier token to
    # trigger forced-inclusion.  Stricter than the ranking-boost guard (min_leaf_len=4)
    # because forced-inclusion directly adds chunks to the candidate pool.
    # Compound identifiers (containing "_", e.g. from_db_value) always trigger
    # regardless of length.  Short common prose words like "name", "path", "args",
    # "kwargs", "field", "class" (≤6 chars, no underscore) are excluded to avoid
    # flooding the pool with common Python attribute names.
    min_identifier_len: 7

    # Non-compound forced-inclusion BM25 relevance floor (Signal A).
    # Score the forced candidate against the full query MINUS the trigger token.
    # If the remaining-term BM25 score (normalised 0..1) is below this floor the
    # chunk is fast-rejected before the more expensive vector cosine check.
    # 5% of max-raw BM25 from remaining tokens — catches zero-overlap geometry/GIS
    # chunks that share only a symbol name with an unrelated migrations query.
    nontrigger_bm25_floor: 0.05

    # Non-compound forced-inclusion vector cosine similarity floor (Signal B).
    # Forced candidates that survive the BM25 fast-reject (Signal A) are then
    # gated by cosine similarity to the full query embedding.  A candidate must
    # reach this threshold to be included; either signal passing is sufficient.
    # cosine similarity threshold (0..1)
    vec_sim_floor: 0.52

    # Curated short-verb forced-inclusion allowlist (UPG-11.14 / F13).
    # These single-word verbs are so commonly used as plain ORM/API method names
    # that natural-language queries (e.g. "save a model instance to the database")
    # genuinely name the symbol.  They are below the min_identifier_len=7 guard
    # (so they would normally be excluded from forced-inclusion) AND are in
    # prog_stopwords.txt (so the symbol-identity boost is also suppressed for them
    # as bare leaves).  This list reinstates forced-inclusion ONLY — the BM25 floor
    # and vec_sim_floor relevance gates still apply, so irrelevant overrides that
    # only share the verb name are rejected by the gate.
    # Rule: tokens in this list bypass the length AND stop-word guards but are
    # treated as NON-COMPOUND (gate-checked) candidates, not compound (unconditional).
    # Edit here — do NOT hardcode this list anywhere in Python source.
    short_verb_allowlist:
      - save
      - get
      - set
      - add
      - create
      - delete
      - update

  doc_intent:
    # When the query is doc-intent (starts with "how to", "what is", "explain",
    # "tutorial", or has a why/how question shape), suppress forced-inclusion so
    # symbol-name tokens in the query (e.g. "deconstruct", "from_db_value") don't
    # flood the candidate pool with 80+ code chunks, burying the documentation
    # the user is actually asking for (UPG-11.11 / F2).
    # Suppressing forced-inclusion is safe for doc-intent queries because the user
    # is asking about a topic, not requesting a specific symbol implementation.
    suppress_forced_inclusion: true

    # When the query is doc-intent, promote documentation prose chunks by this
    # multiplier. Must be a genuine BOOST (> 1.0), not just penalty removal:
    # for a how-to query that also names real symbols (e.g. "how to write a
    # custom model field with deconstruct and from_db_value"), the code chunks
    # for those symbols score ~1.0 from hybrid retrieval, so a neutral 1.0
    # multiplier leaves the doc at its raw ~0.82 and it loses (UPG-11.11-b / F2).
    # 1.2 lifts a strong doc (~0.82 raw, final ~= hybrid_sim x quality) to ~0.98
    # so it competes into the top-k at a distinct rank, staying just under the
    # downstream [0,1] clamp (a value >~1.22 would clamp to 1.0 and merely tie
    # the rank-1 code chunk). Applied in chunk_quality.quality_score() only when
    # is_doc_intent_query fires; tuned against the django acceptance corpus (F2).
    doc_prose_multiplier: 1.2

    # Anchored-prefix phrases: a query is doc-intent when its lowercased,
    # stripped form STARTS WITH any of these. These mark a question/explanation
    # request, so symbol names in the query describe a topic rather than a
    # forced-inclusion target (UPG-11.11). Edit here, not in code.
    prefixes:
      - "how to "
      - "how do "
      - "how does "
      - "how can "
      - "how should "
      - "what is "
      - "what are "
      - "what does "
      - "what's "
      - "why is "
      - "why does "
      - "why do "
      - "explain "
      - "tutorial"
      - "guide to "
      - "introduction to "
      - "overview of "
      - "difference between "
      - "when to use "
      - "when should "
      - "best way to "
      - "best practice"
      - "example of "
      - "examples of "
      - "usage of "

    # Substring phrases: a query is also doc-intent when its lowercased form
    # CONTAINS any of these. Leading space anchors them to word boundaries so
    # identifiers like "tutorial_mode"/"guided_setup" don't false-trigger.
    any_substrings:
      - " tutorial"
      - " howto"
      - " guide"
      - " walkthrough"
      - " example of "
      - " examples of "
      - " usage of "
      - " usage example"

  quality_priors:
    # Multipliers applied to the hybrid similarity score. 1.0 = neutral.
    # Lower = de-ranked further. Applied in chunk_quality.quality_score().

    # Bare stub chunks with almost no content (single-line import, lone brace, etc.)
    trivial: 0.15

    # Maximum number of non-blank lines a HTML/markup or plain-text chunk may contain
    # and still be classified as trivial by is_trivial_chunk() (UPG-15.5).
    # 1-line and 2-line test-fixture templates ("Logged out", "{{ form }}", top_level.txt)
    # are trivial; any real doc prose chunk has many more lines than this.
    # Must be a small integer (≥1) so that multi-line .txt/.rst documentation
    # (Django docs/howto/*.txt, docs/topics/*.txt) are NOT classified trivial.
    # Conservative default: 2 — catches single-line HTML templates and 1–2-line
    # TXT fixtures without risk of demoting substantive documentation.
    trivial_doc_max_lines: 2

    # Re-export / import-only "navigational" chunks (no implementation substance)
    navigational: 0.35

    # Markdown chunks that contain only headings (no prose or code body)
    heading_only: 0.40

    # Machine-generated files (migrations, protobuf output, build artifacts)
    generated: 0.45

    # vectr's own config files — we never want to surface our own internals
    vectr_config: 0.10

    # Test files when the query does not explicitly target tests
    test_deprioritised: 0.55

    # substantive documentation prose vs implementation code
    doc_prose: 0.70

    # bodies with very few meaningful lines
    short_penalty: 0.80

  rerank:
    # rerank this many hybrid candidates before trimming to n_results
    top_k: 40

    # When no language filter is set, doc prose dominates the shallow hybrid pool and
    # real implementation chunks fall outside it (audit: extractor.py / chunk_file never
    # fetched). Fetch a deeper pool in that case so the quality prior has code to surface.
    # UPG-15.5: corpora with many 1–2-line HTML/TXT test-fixture chunks (e.g. Django's
    # ~161 fixture templates) dominate the embedding top-60, pushing real code outside
    # the pool before quality scoring can demote them. Increasing the pool to 200 ensures
    # substantive code chunks (e.g. sessions/backends/base.py) are fetched and then
    # correctly up-ranked after the trivial prior (q=0.15) drops the fixture chunks.
    # Fetching 200 of 41,447 Django chunks is <0.5% of the corpus; latency impact <20ms.
    top_k_unfiltered: 200

indexing:
  # hard cap — prevents single huge chunks diluting embeddings
  max_chunk_lines: 150

  # lines kept for class-level chunk (sig + docstring + attrs)
  class_header_lines: 40

output:
  # Number of lines returned as a snippet with each symbol location.
  # Enough for the AI to understand signature + first few lines of the body.
  snippet_lines: 12

behavior:
  remember_nudge:
    # After this many vectr tool calls without a vectr_remember, the next
    # vectr_search / vectr_locate / vectr_trace response appends an imperative
    # reminder. The counter resets on every vectr_remember call.
    threshold: 10

    # After the threshold fires, re-fires every this many calls so a single
    # dismissal cannot silence it for the rest of the session.
    cooldown: 5

  eviction:
    # Minimum accumulated retrieved-token estimate (since the last auto-eviction
    # hint or session start) required before auto_eviction_hint() will emit the
    # ACTION REQUIRED block.  Gates on real context pressure rather than raw
    # call count — a burst of tiny searches (7-15 line methods, ~30-60 tokens
    # each) does not trigger the hint until meaningful content has been retrieved.
    # Token estimate: len(content) // 4.  At ~100 chars/line, 4000 tokens ≈ 10
    # small methods or 2-3 medium functions.  The explicit vectr_evict_hint tool
    # and /v1/evict endpoint remain ungated.
    retrieved_token_gate: 4000
