name: PyPI Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this version
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" 'index($0, "## " ver) == 1 {f=1; next} /^## /{f=0} f' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No CHANGELOG section found for ${ver}; using autogenerated notes." >&2
            rm release-notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "vectr ${GITHUB_REF_NAME#v}" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "vectr ${GITHUB_REF_NAME#v}" --generate-notes
          fi
