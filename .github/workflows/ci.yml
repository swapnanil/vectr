name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev,encryption]"

      - name: Run tests
        run: pytest tests/

      - name: Run benchmark harness tests
        run: pytest benchmarks/harness/

  vscode-extension:
    name: VS Code extension (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: vscode-extension

      - name: Compile
        run: npm run compile
        working-directory: vscode-extension
