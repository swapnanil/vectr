<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="vectr">
  <defs>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ee6c4"/>
      <stop offset="1" stop-color="#19a8e6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd977" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffd977" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="26" fill="#0d1117"/>
  <g transform="translate(8.4,4) scale(0.86)">
<g>
    <!-- faint symbol-graph edges -->
    <g stroke="#3ee6c4" stroke-opacity="0.28" stroke-width="2">
      <line x1="60" y1="96" x2="105" y2="62"/>
    </g>
    <!-- satellite nodes -->
    <circle cx="105" cy="62" r="4.5" fill="#3ee6c4" fill-opacity="0.55"/>
    <circle cx="88" cy="12" r="3" fill="#3ee6c4" fill-opacity="0.3"/>
    <!-- the V: two vector rays -->
    <g stroke="url(#ray)" stroke-width="13" stroke-linecap="round" fill="none">
      <line x1="24" y1="24" x2="60" y2="96"/>
      <line x1="96" y1="24" x2="60" y2="96"/>
    </g>
    <!-- vertex: the stored point -->
    <circle cx="60" cy="96" r="18" fill="url(#glow)"/>
    <circle cx="60" cy="96" r="9" fill="#f2c94c"/>
  </g>
  </g>
</svg>
